services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: devicemetrics_app
    restart: unless-stopped
    working_dir: /var/www/html      # igual que en dev
    ports:
      - "80:80"
      - "443:443"
      # Sin 5173 — Vite no corre en prod
    networks:
      - devicemetrics
    depends_on:
      - db
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=${DB_DATABASE}
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}

  db:
    image: mysql:8.0
    container_name: devicemetrics_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - dbdata:/var/lib/mysql
    # Sin puerto expuesto — en prod la DB no debe ser accesible externamente
    networks:
      - devicemetrics
    command: --default-authentication-plugin=mysql_native_password

  # Sin phpmyadmin en prod

networks:
  devicemetrics:
    driver: bridge

volumes:
  dbdata:
    driver: local
