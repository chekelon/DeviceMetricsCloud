services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devicemetrics_app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    ports:
      - "8000:80"
      - "5173:5173"
    networks:
      - devicemetrics
    depends_on:
      - db
#      - redis
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=devicemetrics
      - DB_USERNAME=devicemetrics_user
      - DB_PASSWORD=secret_password
      - REDIS_HOST=redis
      - REDIS_PORT=6379

  db:
    image: mysql:8.0
    container_name: devicemetrics_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: devicemetrics
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_USER: devicemetrics_user
      MYSQL_PASSWORD: secret_password
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "3306:3306"
    networks:
      - devicemetrics
    command: --default-authentication-plugin=mysql_native_password

  # redis:
  #   image: redis:alpine
  #   container_name: devicemetrics_redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - devicemetrics

  phpmyadmin:
    platform: linux/amd64
    image: phpmyadmin/phpmyadmin
    container_name: devicemetrics_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root_password
    networks:
      - devicemetrics
    depends_on:
      - db

networks:
  devicemetrics:
    driver: bridge

volumes:
  dbdata:
    driver: local